name: Reusable — Tests

on:
  workflow_call:
    inputs:
      node-versions:
        description: 'Versions Node.js à tester (JSON array)'
        type: string
        default: '[18, 20]'
      coverage-threshold:
        description: 'Seuil minimum de couverture (%)'
        type: number
        default: 80

jobs:
  test:
    name: 🧪 Tests — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }} (via composite action)
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: ${{ matrix.node-version }}

      - name: Tests unitaires + couverture
        run: npm run test:ci

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14
