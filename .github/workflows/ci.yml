name: CI/CD — DevSecOps Pipeline

on:
  push:
    branches: [main, 'feature/**']
    # Challenge 1 — Path filters : ne déclenche le CI que si le code change
    paths:
      - 'src/**'
      - 'package*.json'
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'Dockerfile'           # AJOUT : rebuild si le Dockerfile change
  pull_request:
    branches: [main]
  workflow_dispatch:

# Challenge 3.2 — Concurrency : annule les runs obsolètes sur la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions minimales globales (moindre privilège)
permissions:
  contents: read

env:
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

# ─────────────────────────────────────────────────────────────────
# JOB 1 — Lint + npm audit (existant, complété)
# ─────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 🔍 Lint ESLint + npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Challenge ultime — utilisation de la composite action
      - name: Setup Node.js (via composite action)
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: '18'

      - name: Vérification ESLint
        run: npm run lint

      # AJOUT CHALLENGE — npm audit bloque sur HIGH et CRITICAL
      # LOW et MODERATE ignorés : faible risque d'exploitation directe
      # sur une app web, et évite de bloquer les livraisons pour des
      # CVE théoriques sans vecteur d'attaque concret.
      - name: npm audit — bloquer sur HIGH/CRITICAL
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — Tests matrix (existant, inchangé)
  # ─────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (reusable workflow)
    uses: ./.github/workflows/test-reusable.yml
    with:
      node-versions: '[18, 20]'
      coverage-threshold: 80

  # ─────────────────────────────────────────────────────────────────
  # JOB 3 — Gitleaks (NOUVEAU — détection de secrets dans git)
  # ─────────────────────────────────────────────────────────────────
  gitleaks:
    name: 🔐 Gitleaks — Secret scanning
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout (historique complet pour gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # obligatoire pour scanner tout l'historique git

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # JOB 4 — Build image Docker (NOUVEAU)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker image
    runs-on: ubuntu-latest
    needs: [test, gitleaks]
    permissions:
      contents: read
    outputs:
      has_dockerfile: ${{ steps.check_docker.outputs.has_dockerfile }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile
        id: check_docker
        run: |
          pwd
          ls -la
          if [ -f Dockerfile ]; then
            echo "has_dockerfile=true" >> $GITHUB_OUTPUT
          else
            echo "has_dockerfile=false" >> $GITHUB_OUTPUT
            echo "No Dockerfile found — skipping Docker build steps"
          fi

      - name: Show Dockerfile contents for debug
        if: steps.check_docker.outputs.has_dockerfile == 'true'
        run: |
          echo '--- Dockerfile ---'
          cat Dockerfile
          echo '--- end Dockerfile ---'

      - name: Set up Docker Buildx
        if: steps.check_docker.outputs.has_dockerfile == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image (chargée localement pour Trivy)
        if: steps.check_docker.outputs.has_dockerfile == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          # Cache layer pour accélérer les builds suivants
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # JOB 5 — Trivy (NOUVEAU — scan image + upload SARIF)
  # ─────────────────────────────────────────────────────────────────
  security:
    name: 🛡️ Trivy — Docker image scan
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.has_dockerfile == 'true'
    permissions:
      contents: read
      security-events: write   # requis pour uploader le SARIF dans Security Tab

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild image pour Trivy
        # Les artefacts Docker ne persistent pas entre jobs — on rebuild
        # (rapide grâce au cache GHA configuré dans le job build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha

      - name: Trivy — format table (lisible dans les logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '0'       # pas de blocage ici, le SARIF gère ça
          severity: 'HIGH,CRITICAL'

      - name: Trivy — format SARIF (upload Security Tab)
        id: trivy_sarif
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'       # bloque le pipeline si CVE HIGH/CRITICAL
          severity: 'HIGH,CRITICAL'

      - name: Check SARIF output
        id: check_sarif
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "file_exists=true" >> $GITHUB_OUTPUT
          else
            echo "file_exists=false" >> $GITHUB_OUTPUT
            echo "SARIF output not found"
            ls -la
          fi

      - name: Upload rapport SARIF → GitHub Security Tab
        if: always() && steps.check_sarif.outputs.file_exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-docker-scan'

  # ─────────────────────────────────────────────────────────────────
  # JOB 6 — Rapport coverage consolidé (existant, needs étendu)
  # ─────────────────────────────────────────────────────────────────
  report:
    name: 📊 Rapport Coverage
    runs-on: ubuntu-latest
    # MODIFIÉ : on attend aussi security pour que le rapport récapitule tout
    needs: [lint, test, security]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Télécharger tous les rapports de couverture
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-node-*
          merge-multiple: false
          path: all-coverage/

      - name: Afficher le résumé consolidé dans Step Summary
        continue-on-error: true
        run: |
          echo '## 📊 Rapport de Couverture — Toutes versions' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Version Node | Statements | Branches | Functions | Lines |' >> $GITHUB_STEP_SUMMARY
          echo '|-------------|-----------|---------|----------|-------|' >> $GITHUB_STEP_SUMMARY

          for dir in all-coverage/coverage-node-*/; do
            version=$(basename "$dir" | sed 's/coverage-node-//')
            summary="$dir/coverage-summary.json"
            if [ -f "$summary" ]; then
              node -e "
                const d = JSON.parse(require('fs').readFileSync('$summary', 'utf8')).total;
                const emoji = (pct) => pct >= 80 ? '✅ ' + pct : '❌ ' + pct;
                console.log('| Node ' + '$version' + ' | ' + emoji(d.statements.pct) + '% | ' + emoji(d.branches.pct) + '% | ' + emoji(d.functions.pct) + '% | ' + emoji(d.lines.pct) + '% |');
              " >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Résultat global CI
        run: |
          lint_ok='${{ needs.lint.result }}'
          test_ok='${{ needs.test.result }}'
          security_ok='${{ needs.security.result }}'
          echo "Lint: $lint_ok | Tests: $test_ok | Security: $security_ok"

          # Ne considérez comme échec que les jobs en 'failure'
          if [ "$lint_ok" = 'failure' ] || [ "$test_ok" = 'failure' ] || [ "$security_ok" = 'failure' ]; then
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '## ❌ CI échoué' >> $GITHUB_STEP_SUMMARY
            echo "Lint: $lint_ok | Tests: $test_ok | Security: $security_ok" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo '' >> $GITHUB_STEP_SUMMARY
          echo '## ✅ CI complet — tous les jobs sont verts (ou skipped)' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────
  # JOB 7 — Déploiement (NOUVEAU — main uniquement)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to production
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write   # requis pour GitHub Deployments API

    steps:
      - uses: actions/checkout@v4

      - name: Créer un GitHub Deployment (statut "in_progress")
        uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: production
          ref: ${{ github.sha }}

      - name: Déclencher le déploiement Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail-with-body
        # RENDER_DEPLOY_HOOK_URL → GitHub Settings > Secrets
        # NE JAMAIS mettre l'URL directement dans ce fichier

      - name: Health check post-déploiement
        run: |
          echo "Attente du démarrage de l'app (30s)..."
          sleep 30
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.APP_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check OK (status $STATUS)"
              exit 0
            fi
            echo "Tentative $i/10 — status: $STATUS — retry dans 15s..."
            sleep 15
          done
          echo "❌ Health check échoué après 10 tentatives"
          exit 1

      - name: Mettre à jour GitHub Deployment — succès
        uses: bobheadxi/deployments@v1
        if: success()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: success
          env: ${{ steps.deployment.outputs.env }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          env_url: ${{ vars.APP_URL }}

      - name: Mettre à jour GitHub Deployment — échec
        uses: bobheadxi/deployments@v1
        if: failure()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: failure
          env: ${{ steps.deployment.outputs.env }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}

  # ─────────────────────────────────────────────────────────────────
  # JOB 8 — Notification Slack échec (NOUVEAU)
  # ─────────────────────────────────────────────────────────────────
  notify-failure:
    name: 🔴 Notify Slack — Failure
    runs-on: ubuntu-latest
    needs: [lint, test, gitleaks, build, security, report, deploy]
    if: failure()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    permissions:
      contents: read

    steps:
      - name: Slack — alerte échec
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🔴 Pipeline échoué — ${{ github.repository }}"
            }