name: CI — Lint, Tests & Coverage

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ─── JOB 1 : Lint ────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 🔍 Lint ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification ESLint
        run: npm run lint

# ─── JOB 2 : Tests avec matrice ──────────────────────────────────────────────
# Pas de needs: ici — lint et test tournent EN PARALLÈLE
  test:
    name: 🧪 Tests Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # Ne pas annuler l'autre run si l'un échoue
      matrix:
        node-version: [18, 20]   # 2 jobs lancés simultanément

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Tests unitaires + couverture
        run: npm run test:ci

      # Bonus 4.2 — Résumé de couverture visible directement dans GitHub Actions
      - name: Résumé de couverture
        if: always()
        run: |
          echo '## 📊 Couverture de code — Node ${{ matrix.node-version }}' >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            cat coverage/coverage-summary.json | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const t = data.total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + t.statements.pct + '% |');
              console.log('| Branches   | ' + t.branches.pct   + '% |');
              console.log('| Functions  | ' + t.functions.pct  + '% |');
              console.log('| Lines      | ' + t.lines.pct      + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

      # Bonus 5.3 — Commentaire automatique sur Pull Request
      - name: Commenter la PR avec la couverture
        if: github.event_name == 'pull_request'
        uses: MishaKav/jest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-summary-path: ./coverage/coverage-summary.json

# ─── JOB 3 : Résumé final ────────────────────────────────────────────────────
# Attend que lint ET test soient tous les deux terminés
  ci-success:
    name: ✅ CI complet
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: always()

    steps:
      - name: Vérifier que tout est vert
        run: |
          if [ '${{ needs.lint.result }}' != 'success' ]; then
            echo '❌ Lint a échoué !'
            exit 1
          fi
          if [ '${{ needs.test.result }}' != 'success' ]; then
            echo '❌ Tests ont échoué !'
            exit 1
          fi
          echo '✅ CI entièrement vert ✓'

# ─── JOB 4 : Notification échec (Bonus 5.2) ──────────────────────────────────
# S'exécute UNIQUEMENT si lint ou test a échoué
# Nécessite le secret SLACK_WEBHOOK_URL dans Settings → Secrets → Actions
  notify-failure:
    name: 🔔 Notifier échec
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: failure()

    steps:
      - name: Notifier via webhook Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🔴 Pipeline CI échoué sur ${{ github.repository }} — commit ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }}
